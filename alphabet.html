<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Bảng chữ cái</title>

<link rel="stylesheet" href="style.css">

<script src="js/audio.js"></script>

<style>

body{

background:#f5f5f5;

font-family:Arial;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(120px,1fr));

gap:15px;

padding:20px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

text-align:center;

box-shadow:0 2px 10px rgba(0,0,0,.15);

}

.letter{

font-size:60px;

font-weight:bold;

color:#16a34a;

}

button{

margin-top:15px;

width:100%;

padding:12px;

background:#16a34a;

border:none;

border-radius:10px;

color:white;

font-size:16px;

}

</style>

</head>

<body>

<header>

<h1>

🔤 Bảng chữ cái tiếng Việt

</h1>

</header>

<div class="grid" id="alphabet">

</div>

<script>

const alphabet=[

"A","Ă","Â",

"B","C","D","Đ",

"E","Ê",

"G","H",

"I",

"K","L","M","N",

"O","Ô","Ơ",

"P","Q","R","S","T",

"U","Ư",

"V","X","Y"

];

let html="";

alphabet.forEach(letter=>{

html+=`

<div class="card">

<div class="letter">

${letter}

</div>

<button onclick="audio.speak('${letter}')">

🔊 Nghe

</button>

</div>

`;

});

document.getElementById("alphabet").innerHTML=html;

</script>

</body>

</html>
