<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảng chữ cái tiếng Việt</title>

<link rel="stylesheet" href="style.css">

<script src="audio.js"></script>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

header{
    background:#16a34a;
    color:white;
    text-align:center;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.letter{
    font-size:60px;
    font-weight:bold;
    color:#16a34a;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#138a3d;
}

</style>

</head>

<body>

<header>

<h1>🔤 Bảng chữ cái tiếng Việt</h1>

</header>

<div class="grid" id="alphabet"></div>

<script>

const alphabet = [

"A","Ă","Â",

"B","C","D","Đ",

"E","Ê",

"G","H",

"I",

"K","L","M","N",

"O","Ô","Ơ",

"P","Q","R","S","T",

"U","Ư",

"V","X","Y"

];

const container = document.getElementById("alphabet");

alphabet.forEach(letter=>{

    const card=document.createElement("div");

    card.className="card";

    card.innerHTML=`

        <div class="letter">${letter}</div>

        <button>🔊 Nghe phát âm</button>

    `;

    card.querySelector("button").addEventListener("click",()=>{

        if(typeof audio==="undefined"){

            alert("Không tìm thấy audio.js");

            return;

        }

        audio.speak(letter);

    });

    container.appendChild(card);

});

</script>

</body>

</html>
