<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảng chữ cái tiếng Việt</title>

<link rel="stylesheet" href="style.css">

<style>

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(120px,1fr));

gap:15px;

padding:20px;

}

.card{

text-align:center;

}

.letter{

font-size:60px;

font-weight:bold;

color:#16a34a;

}

.name{

font-size:22px;

margin:10px 0;

}

</style>

</head>

<body>

<header>

<h1>🔤 Bảng chữ cái tiếng Việt</h1>

<p>越南语字母</p>

</header>

<div class="grid" id="alphabet"></div>

<script>

const letters=[

{name:"A",file:"A"},

{name:"Ă",file:"AW"},

{name:"Â",file:"AA"},

{name:"B",file:"B"},

{name:"C",file:"C"},

{name:"D",file:"D"},

{name:"Đ",file:"DD"},

{name:"E",file:"E"},

{name:"Ê",file:"EE"},

{name:"G",file:"G"},

{name:"H",file:"H"},

{name:"I",file:"I"},

{name:"K",file:"K"},

{name:"L",file:"L"},

{name:"M",file:"M"},

{name:"N",file:"N"},

{name:"O",file:"O"},

{name:"Ô",file:"OO"},

{name:"Ơ",file:"OW"},

{name:"P",file:"P"},

{name:"Q",file:"Q"},

{name:"R",file:"R"},

{name:"S",file:"S"},

{name:"T",file:"T"},

{name:"U",file:"U"},

{name:"Ư",file:"UW"},

{name:"V",file:"V"},

{name:"X",file:"X"},

{name:"Y",file:"Y"}

];

let html="";

letters.forEach(function(item){

html+=`

<div class="card">

<div class="letter">${item.name}</div>

<div class="name">${item.name}</div>

<button onclick="play('${item.file}')">

🔊 Nghe

</button>

</div>

`;

});

document.getElementById("alphabet").innerHTML=html;

function play(name){

const audio=new Audio("audio/"+name+".mp3");

audio.play();

}

</script>

</body>

</html>
