<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng chữ cái tiếng Việt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🔤 Bảng chữ cái tiếng Việt</h1>
</header>

<div id="alphabetContainer" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>

<script>
    // Danh sách đầy đủ 29 chữ cái tiếng Việt
    const alphabet = [
        { char: "A", sound: "a" }, { char: "Ă", sound: "ă" }, { char: "Â", sound: "â" },
        { char: "B", sound: "bờ" }, { char: "C", sound: "cờ" }, { char: "D", sound: "dờ" },
        { char: "Đ", sound: "đờ" }, { char: "E", sound: "e" }, { char: "Ê", sound: "ê" },
        { char: "G", sound: "gờ" }, { char: "H", sound: "hờ" }, { char: "I", sound: "i" },
        { char: "K", sound: "ca" }, { char: "L", sound: "lờ" }, { char: "M", sound: "mờ" },
        { char: "N", sound: "nờ" }, { char: "O", sound: "o" }, { char: "Ô", sound: "ô" },
        { char: "Ơ", sound: "ơ" }, { char: "P", sound: "pờ" }, { char: "Q", sound: "cu" },
        { char: "R", sound: "rờ" }, { char: "S", sound: "sờ" }, { char: "T", sound: "tờ" },
        { char: "U", sound: "u" }, { char: "Ư", sound: "ư" }, { char: "V", sound: "vờ" },
        { char: "X", sound: "xờ" }, { char: "Y", sound: "i dài" }
    ];

    const container = document.getElementById("alphabetContainer");

    alphabet.forEach(item => {
        container.innerHTML += `
            <div class="card" style="width: 80px; margin: 5px; text-align: center;">
                <div class="letter" style="font-size: 24px; font-weight: bold;">${item.char}</div>
                <button onclick="speak('${item.sound}')" style="margin-top: 5px;">🔊</button>
            </div>
        `;
    });

    function speak(text) {
        // Hủy phát âm cũ để tránh chồng lấn âm thanh
        window.speechSynthesis.cancel();
        
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = "vi-VN"; // Thiết lập ngôn ngữ tiếng Việt[span_1](start_span)[span_1](end_span)[span_2](start_span)[span_2](end_span)
        speech.rate = 0.8;    // Tốc độ phát âm chuẩn, chậm rãi[span_3](start_span)[span_3](end_span)[span_4](start_span)[span_4](end_span)
        speech.pitch = 1;     // Giọng cố định[span_5](start_span)[span_5](end_span)
        
        window.speechSynthesis.speak(speech);
    }
</script>

</body>
</html>
