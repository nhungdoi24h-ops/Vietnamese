<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danh sách bài học</title>

<link rel="stylesheet" href="style.css">

<script src="data.js"></script>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#16a34a;
    color:white;
    text-align:center;
    padding:20px;
}

.lesson{
    background:white;
    margin:15px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.lesson h2{
    margin:0 0 10px;
    color:#16a34a;
}

.lesson p{
    color:#666;
}

.button{
    display:inline-block;
    margin-top:15px;
    padding:12px 20px;
    background:#16a34a;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.button:hover{
    background:#138a3d;
}

</style>

</head>

<body>

<header>

<h1>📚 Danh sách bài học</h1>

<p>Chọn bài học để bắt đầu</p>

</header>

<div id="lessonList"></div>

<div style="text-align:center;margin:20px;">

<a class="button" href="index.html">

🏠 Trang chủ

</a>

</div>

<script>

const container = document.getElementById("lessonList");

if(typeof lessons === "undefined"){

    container.innerHTML = `
        <div class="lesson">
            <h2>Lỗi</h2>
            <p>Không tìm thấy dữ liệu bài học.</p>
            <p>Hãy kiểm tra file <b>data.js</b>.</p>
        </div>
    `;

}else{

    lessons.forEach((lesson,index)=>{

        const card=document.createElement("div");

        card.className="lesson";

        card.innerHTML=`

            <h2>${lesson.title}</h2>

            <p>📖 Số từ: ${lesson.words.length}</p>

            <a class="button"
               href="vocabulary.html?lesson=${index}">
               Bắt đầu học
            </a>

        `;

        container.appendChild(card);

    });

}

</script>

</body>

</html>
